name: create-directory
 

on:
  push:

jobs:
  mkdir-on-remote:
    runs-on: ubuntu-latest

    steps:
      - name: Install SSH key
        uses: shimataro/ssh-key-action@v2
        with:
          key: ${{ secrets.SERVER_SSH_KEY }}
          passphrase: ${{ secrets.SERVER_SSH_PASSPHRASE }}
          known_hosts: ${{ secrets.SERVER_HOST }}

      - name: Debug SSH environment and connectivity
        run: |
          set -e

          echo "=== LOCAL ENVIRONMENT ==="
          echo "Runner user: $(whoami)"
          echo "HOME=$HOME"
          echo

          echo "=== TARGET INFO ==="
          echo "Attempting SSH login to ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PORT }}"
          echo

          echo "=== ~/.ssh CONTENTS ==="
          ls -al ~/.ssh || true
          echo

          echo "=== SSH AGENT / IDENTITIES ==="
          echo "SSH_AUTH_SOCK=${SSH_AUTH_SOCK:-<unset>}"
          ssh-add -l || echo "No SSH identities loaded"
          echo

          echo "=== DNS RESOLUTION ==="
          getent hosts ${{ secrets.SERVER_HOST }} || true
          echo

          echo "=== PORT CONNECTIVITY TEST ==="
          nc -zv ${{ secrets.SERVER_HOST }} ${{ secrets.SERVER_PORT }} || true
          echo

          echo "=== SSH CONFIG (first 30 lines) ==="
          ssh -G -p ${{ secrets.SERVER_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} | head -30 || true
          echo

      - name: Create repo directory on remote server
        run: |
          set -euo pipefail

          echo "Attempting SSH login as user: ${{ secrets.SERVER_USER }}"
          echo "Target host: ${{ secrets.SERVER_HOST }}"
          echo "Port: ${{ secrets.SERVER_PORT }}"

          ssh -vvv -p ${{ secrets.SERVER_PORT }} \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p repo && ls -ld repo && id"
