name: create-directory
on:
  push:

jobs:
  mkdir-on-remote:
    runs-on: ubuntu-latest

    steps:
      - name: Start SSH agent and add key
        run: |
          set -e

          echo "Starting ssh-agent..."
          eval "$(ssh-agent -s)"

          echo "Writing private key to file..."
          echo "${{ secrets.SERVER_SSH_KEY }}" > key
          chmod 600 key

          echo "Adding key to agent..."
          echo "${{ secrets.SERVER_SSH_PASSPHRASE }}" | ssh-add key

          echo "Loaded identities:"
          ssh-add -l

      - name: Debug SSH environment
        run: |
          set -e

          echo "=== LOCAL ENVIRONMENT ==="
          echo "Runner user: $(whoami)"
          echo "HOME=$HOME"
          echo

          echo "=== TARGET INFO ==="
          echo "Attempting SSH login to ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PORT }}"
          echo

          echo "=== DNS RESOLUTION ==="
          getent hosts ${{ secrets.SERVER_HOST }} || true
          echo

          echo "=== PORT CONNECTIVITY TEST ==="
          nc -zv ${{ secrets.SERVER_HOST }} ${{ secrets.SERVER_PORT }} || true
          echo

      - name: Create repo directory on remote server
        run: |
          set -euo pipefail

          ssh -vvv -p ${{ secrets.SERVER_PORT }} \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p repo && ls -ld repo && id"
