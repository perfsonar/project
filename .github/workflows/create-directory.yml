name: create-directory

on:
  push:

jobs:
  mkdir-on-remote:
    runs-on: ubuntu-latest

    steps:
      - name: Start SSH agent and add key
        run: |
          set -euo pipefail

          echo "Starting ssh-agent..."
          eval "$(ssh-agent -s)"

          # Persist agent for next step
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK" >> $GITHUB_ENV
          echo "SSH_AGENT_PID=$SSH_AGENT_PID" >> $GITHUB_ENV

          echo "Setting up ~/.ssh directory..."
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "Writing private key..."
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          echo "Adding key to agent..."
          echo "${{ secrets.SERVER_SSH_PASSPHRASE }}" | ssh-add ~/.ssh/id_ed25519

          echo "Loaded identities:"
          ssh-add -l

      - name: Create repo directory on remote server
        run: |
          set -euo pipefail

          echo "Attempting SSH login to ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:${{ secrets.SERVER_PORT }}"
          echo "SSH_AUTH_SOCK=$SSH_AUTH_SOCK"
          ssh-add -l || true

          ssh -vvv -p ${{ secrets.SERVER_PORT }} \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            "mkdir -p repo && ls -ld repo && id"
